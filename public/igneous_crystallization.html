<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igneous Crystallization Simulator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f3ef;
    font-family: system-ui, -apple-system, sans-serif;
    color: #1a1816;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    padding: 32px 16px 48px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 4px;
    text-align: center;
  }

  .tagline {
    font-size: 12px;
    font-weight: 500;
  }

  .sbtn, .cbtn {
    background: #fff;
    border: 1px solid #ccc8c0;
    color: #5a5248;
    font-size: 12px;
    letter-spacing: .08em;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 6px;
    font-family: inherit;
    text-transform: uppercase;
    transition: all .15s;
    white-space: nowrap;
  }
  .sbtn:hover, .cbtn:hover { border-color: #8a7a6a; color: #1a1816; }
  .sbtn.on, .cbtn.on {
    background: #f0ece4;
    border-color: #8a7a6a;
    color: #1a1816;
    font-weight: 600;
  }

  .btn-row { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }

  .comp-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .comp-label {
    font-size: 12px;
    color: #8a7a6a;
    letter-spacing: .06em;
  }

  #desc {
    font-size: 14px;
    color: #5a5248;
    min-height: 20px;
    margin-bottom: 14px;
    line-height: 1.5;
    max-width: 520px;
    text-align: center;
  }

  .viz-row { display: flex; gap: 10px; align-items: stretch; justify-content: center; }

  canvas {
    display: block;
    border: 1px solid #d4cfc8;
    border-radius: 8px;
    flex-shrink: 0;
    width: 420px;
    height: 420px;
  }

  .gauge-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 36px;
    gap: 3px;
  }
  .gauge-lbl {
    font-size: 10px;
    color: #8a7a6a;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .gauge-track {
    width: 10px;
    background: #e8e4dc;
    border: 1px solid #d4cfc8;
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .gauge-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0%;
  }
  .gauge-val {
    font-size: 12px;
    color: #7a7060;
    text-align: center;
    line-height: 1.3;
    min-height: 28px;
  }
  .gauge-divider {
    width: 100%;
    height: 1px;
    background: #d4cfc8;
    margin: 4px 0;
  }

  .result-box {
    margin-top: 22px;
    text-align: center;
    opacity: 0;
    transform: translateY(5px);
    transition: opacity .65s, transform .65s;
    pointer-events: none;
  }
  .result-box.on {
    opacity: 1;
    transform: none;
    pointer-events: auto;
  }
  .tex {
    font-size: 24px;
    font-weight: 600;
    color: #1a1816;
    margin-bottom: 4px;
  }
  .rks {
    font-size: 12px;
    color: #5a5248;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .nt {
    font-size: 13px;
    color: #7a7060;
    margin-bottom: 12px;
  }
  .essrt-tag {
    display: inline-block;
    border: 1px solid #ccc8c0;
    padding: 4px 14px;
    border-radius: 6px;
    font-size: 12px;
    color: #7a7060;
    letter-spacing: .08em;
  }

  .replay-wrap { text-align: center; margin-top: 12px; }
</style>
</head>
<body>

<h1>Igneous Crystallization</h1>
<p class="tagline">Cooling rate → crystal texture → rock type</p>

<div class="btn-row">
  <button class="sbtn" data-k="slow">① Deep intrusive</button>
  <button class="sbtn" data-k="fast">② Surface lava flow</button>
  <button class="sbtn" data-k="glassy">③ Explosive eruption</button>
  <button class="sbtn" data-k="porphyritic">④ Porphyritic</button>
</div>

<div class="comp-row">
  <span class="comp-label">Composition:</span>
  <button class="cbtn on" data-c="felsic">Felsic — granitic</button>
  <button class="cbtn" data-c="mafic">Mafic — basaltic</button>
</div>

<p id="desc">Select a cooling environment above</p>

<div class="viz-row">
  <canvas id="cv" width="420" height="420"></canvas>

  <div class="gauge-col">
    <div class="gauge-lbl">temp</div>
    <div class="gauge-track" style="flex:1">
      <div id="tf" class="gauge-fill" style="background:linear-gradient(to top,#c82800,#e86000,#f5a200);transition:height 90ms linear"></div>
    </div>
    <div id="tr" class="gauge-val">—</div>

    <div class="gauge-divider"></div>

    <div class="gauge-lbl">depth</div>
    <div class="gauge-track" style="height:100px">
      <div id="df" class="gauge-fill" style="background:linear-gradient(to top,#3a2010,#7a5030);transition:height 180ms ease-out"></div>
    </div>
    <div id="dr" class="gauge-val">—</div>
    <div class="gauge-lbl">km</div>
  </div>
</div>

<div class="result-box" id="res">
  <div class="tex" id="tex"></div>
  <div class="rks" id="rks"></div>
  <div class="nt" id="nt"></div>
  <div class="essrt-tag">ESSRT p. 14 — Igneous rock identification</div>
</div>

<div class="replay-wrap">
  <button id="rp" class="sbtn" style="display:none">↺ Replay</button>
</div>

<script>
var cv=document.getElementById('cv'),cx=cv.getContext('2d');
var W=cv.width,H=cv.height;
var token=0,cur=null,comp='felsic';

// ── Stage configs ──────────────────────────────────────────────────────────
var SC={
  slow:        {dur:8000,fast:false,desc:'Magma cooling slowly over millions of years, kilometers underground',                                       tex:'Phaneritic',  rks:'Granite · Gabbro · Diorite',                            nt:'Crystal size: several mm to cm — visible to the naked eye',                                                               t0:900, t1:620,depth:15},
  fast:        {dur:2500,fast:true, desc:"Lava cooling rapidly over days to weeks at Earth's surface",                                               tex:'Aphanitic',   rks:'Basalt · Rhyolite · Andesite',                          nt:'Crystal size: < 1mm — requires magnification to see',                                                                     t0:1100,t1:760,depth:0},
  glassy:      {dur:1300,fast:false,desc:'Magma quenched almost instantly — no time for crystal structure to form',                                   tex:'Glassy',      rks:'Obsidian · Pumice · Scoria',                             nt:'No crystalline structure — amorphous solid glass',                                                                        t0:1200,t1:680,depth:0},
  porphyritic: {dur:6500,fast:false,desc:'Slow underground cooling builds large phenocrysts — then eruption causes rapid groundmass crystallization', tex:'Porphyritic', rks:'Porphyry · Porphyritic basalt · Porphyritic rhyolite',   nt:'Large phenocrysts (slow cooling) within fine-grained groundmass (fast cooling) — evidence of two-stage cooling history',  t0:1200,t1:620}
};

// ── Mineral color palettes ─────────────────────────────────────────────────
var MC={
  olivine:  [[84,110,44],[92,120,50],[78,102,40],[98,128,56],[74,96,36]],
  pyroxene: [[38,54,28],[44,60,34],[32,46,22],[50,66,38],[36,52,26]],
  caPlag:   [[208,210,215],[215,217,222],[201,203,208],[219,221,226],[206,208,213]],
  naPlag:   [[204,204,207],[211,211,214],[198,198,201],[217,217,220],[207,207,210]],
  amphibole:[[24,26,33],[30,32,39],[20,21,28],[36,38,45],[22,23,30]],
  biotite:  [[52,38,23],[62,46,28],[44,32,18],[68,50,30],[56,42,24]],
  kFeld:    [[212,150,130],[222,158,138],[204,142,122],[230,164,144],[216,154,133]],
  muscovite:[[200,198,188],[210,208,198],[192,190,180],[216,214,204],[204,202,192]],
  quartz:   [[104,111,121],[114,121,131],[97,104,114],[121,129,139],[109,116,126]]
};

// ── Mineral assemblages per composition ───────────────────────────────────
var MA={
  felsic:[
    {key:'kFeld',    nP:0.03,col:MC.kFeld,    ar:1.6,cnt:36},
    {key:'naPlag',   nP:0.12,col:MC.naPlag,   ar:2.4,cnt:50},
    {key:'quartz',   nP:0.20,col:MC.quartz,   ar:1.1,cnt:54},
    {key:'muscovite',nP:0.34,col:MC.muscovite,ar:3.4,cnt:18},
    {key:'amphibole',nP:0.48,col:MC.amphibole,ar:4.0,cnt:12}
  ],
  mafic:[
    {key:'pyroxene', nP:0.03,col:MC.pyroxene, ar:1.8,cnt:98},
    {key:'caPlag',   nP:0.08,col:MC.caPlag,   ar:2.7,cnt:78},
    {key:'olivine',  nP:0.15,col:MC.olivine,  ar:2.3,cnt:52},
    {key:'amphibole',nP:0.35,col:MC.amphibole,ar:4.5,cnt:20}
  ]
};

// ── Utilities ──────────────────────────────────────────────────────────────
function rng(seed){var s=seed>>>0;return function(){s=(Math.imul(s,1664525)+1013904223)>>>0;return s/4294967296;};}
function hashStr(k){var h=5381;for(var i=0;i<k.length;i++)h=((h<<5)+h+k.charCodeAt(i))&0x7fffffff;return h+1;}

// Scale mineral counts to reach a target seed total; optionally cap aspect ratio for aphanitic mode
function scaledMinerals(c,target,arMax){
  var base=MA[c],tot=base.reduce(function(s,m){return s+m.cnt;},0),sc=target/tot;
  return base.map(function(m){return {key:m.key,nP:m.nP,col:m.col,ar:arMax?Math.min(arMax,m.ar):m.ar,cnt:Math.max(1,Math.round(m.cnt*sc))};});
}

// ── Anisotropic Voronoi + per-mineral data (slow / fast modes) ────────────
var SD={};
function buildMineralData(cacheKey,mnList){
  if(SD[cacheKey])return SD[cacheKey];
  var rand=rng(hashStr(cacheKey));
  var total=mnList.reduce(function(s,m){return s+m.cnt;},0);
  var sX=new Float32Array(total),sY=new Float32Array(total);
  var sCos=new Float32Array(total),sSin=new Float32Array(total);
  var sAx=new Float32Array(total),sNP=new Float32Array(total);
  var sR=new Uint8Array(total),sG=new Uint8Array(total),sB=new Uint8Array(total);
  var sMKey=[];
  var si=0;
  for(var m=0;m<mnList.length;m++){
    var mn=mnList[m];
    for(var gi=0;gi<mn.cnt;gi++){
      var c=mn.col[Math.floor(rand()*mn.col.length)],nz=(rand()-.5)*28;
      var theta=rand()*Math.PI,axV=mn.ar+(rand()-.5)*.45;
      sX[si]=rand()*W;sY[si]=rand()*H;
      sCos[si]=Math.cos(theta);sSin[si]=Math.sin(theta);
      sAx[si]=axV;sNP[si]=Math.max(0.01,Math.min(0.80,mn.nP+(rand()-.5)*.15));
      sR[si]=Math.min(255,Math.max(0,(c[0]+nz)|0));
      sG[si]=Math.min(255,Math.max(0,(c[1]+nz)|0));
      sB[si]=Math.min(255,Math.max(0,(c[2]+nz)|0));
      sMKey[si]=mn.key;si++;
    }
  }
  var S=total;
  var nI=new Int32Array(W*H),nD=new Float32Array(W*H),nA=new Float32Array(W*H),nA2=new Float32Array(W*H);
  for(var py=0;py<H;py++){
    for(var px=0;px<W;px++){
      var idx=py*W+px,bd1=1e9,bd2=1e9,bs=0;
      for(var s=0;s<S;s++){
        var dx=px-sX[s],dy=py-sY[s];
        var rx=dx*sCos[s]+dy*sSin[s],ry=-dx*sSin[s]+dy*sCos[s],iax=1/sAx[s];
        var dd=(rx*iax)*(rx*iax)+ry*ry;
        if(dd<bd1){bd2=bd1;bd1=dd;bs=s;}else if(dd<bd2)bd2=dd;
      }
      nI[idx]=bs;
      var ex=px-sX[bs],ey=py-sY[bs];
      nD[idx]=Math.sqrt(ex*ex+ey*ey);nA[idx]=bd1;nA2[idx]=bd2;
    }
  }
  var maxD=0,maxNP=0;
  for(var i=0;i<W*H;i++)if(nD[i]>maxD)maxD=nD[i];
  for(var s=0;s<S;s++)if(sNP[s]>maxNP)maxNP=sNP[s];
  SD[cacheKey]={sX:sX,sY:sY,sCos:sCos,sSin:sSin,sNP:sNP,sR:sR,sG:sG,sB:sB,sMKey:sMKey,nI:nI,nD:nD,nA:nA,nA2:nA2,gS:maxD/(1-maxNP-.025),S:S};
  return SD[cacheKey];
}

// ── Mineral optical effects (twinning, cleavage, perthite, conchoidal) ────
function applyMineralFX(r,g,b,mk,i,cx_,cy_,cosA,sinA){
  var ppx=i%W,ppy=(i/W)|0,dx=ppx-cx_,dy=ppy-cy_;
  if(mk==='caPlag'||mk==='naPlag'){
    var perp=dx*sinA-dy*cosA,twin=((((perp/2.6)|0)%2)+2)%2,tw=twin?10:-6;
    r=Math.min(255,Math.max(0,r+tw));g=Math.min(255,Math.max(0,g+tw));b=Math.min(255,Math.max(0,b+tw));
  }else if(mk==='biotite'){
    var perp=dx*sinA-dy*cosA,band=(((perp/3.2)|0)%3+3)%3;
    if(band===0){r=Math.min(255,r+48);g=Math.min(255,g+30);b=Math.min(255,b+2);}
    else if(band===2){r=Math.max(0,r-10);g=Math.max(0,g-6);}
  }else if(mk==='muscovite'){
    var perp=dx*sinA-dy*cosA,band=(((perp/2.8)|0)%4+4)%4;
    if(band===0){r=Math.min(255,r+35);g=Math.min(255,g+35);b=Math.min(255,b+35);}
    else if(band===1){r=Math.max(0,r-14);g=Math.max(0,g-14);b=Math.max(0,b-14);}
  }else if(mk==='kFeld'){
    var perp=dx*sinA-dy*cosA,para=dx*cosA+dy*sinA;
    var lam=(((perp*.38+para*.05)/4.5)|0)%3,lp=(lam%3+3)%3;
    if(lp===0){r=Math.min(255,r+18);g=Math.min(255,g+10);b=Math.min(255,b+8);}
    else if(lp===2){r=Math.max(0,r-12);g=Math.max(0,g-5);b=Math.min(255,b+10);}
  }else if(mk==='quartz'){
    var q1=((ppx*31+ppy*17+(ppx^(ppy*7)))&0xff)-128;
    var q2=((ppx*53+ppy*41+(ppy^(ppx*11)))&0xff)-128;
    var qn=(q1+q2)*.038;
    r=Math.min(255,Math.max(0,(r+qn)|0));
    g=Math.min(255,Math.max(0,(g+qn)|0));
    b=Math.min(255,Math.max(0,(b+qn*1.15)|0));
  }
  return [r,g,b];
}

// ── Pixel render pass (anisotropic Voronoi + mineral shaders) ─────────────
function renderMinerals(st,p){
  var img=cx.createImageData(W,H),d=img.data;
  var sX=st.sX,sY=st.sY,sCos=st.sCos,sSin=st.sSin,sNP=st.sNP;
  var sR=st.sR,sG=st.sG,sB=st.sB,sMKey=st.sMKey;
  var nI=st.nI,nD=st.nD,nA=st.nA,nA2=st.nA2,gS=st.gS;
  for(var i=0;i<W*H;i++){
    var si=nI[i],nP=sNP[si],crysT=nP+nD[i]/gS,bi=i*4;
    if(p>=crysT){
      var bf=(nA2[i]>0&&nA[i]/nA2[i]>0.70)?0.54:1.0;
      var rgb=applyMineralFX(sR[si],sG[si],sB[si],sMKey[si],i,sX[si],sY[si],sCos[si],sSin[si]);
      var nz=((i*73+17)&0xff)*.013-.85;
      d[bi  ]=Math.min(255,Math.max(0,(rgb[0]*bf+nz)|0));
      d[bi+1]=Math.min(255,Math.max(0,(rgb[1]*bf+nz)|0));
      d[bi+2]=Math.min(255,Math.max(0,(rgb[2]*bf+nz)|0));
    }else{
      var glow=(nP<=p)?Math.max(0,1-(crysT-p)*gS*.062):0,heat=1-p*.68;
      var nzM=((i*97+31)&0xff)*.065-3.2;
      d[bi  ]=Math.min(255,Math.max(0,(192+heat*56+glow*62+nzM)|0));
      d[bi+1]=Math.min(255,Math.max(0,(50+heat*28+glow*30+nzM*.28)|0));
      d[bi+2]=Math.min(255,Math.max(0,(5+glow*7)|0));
    }
    d[bi+3]=255;
  }
  cx.putImageData(img,0,0);
}

// ── Isotropic Voronoi (porphyritic phenocryst territory) ──────────────────
function buildVoronoi(pts){
  var N=pts.length,own=new Int32Array(W*H),dst=new Float32Array(W*H),mxD=new Float32Array(N);
  for(var y=0;y<H;y++)for(var x=0;x<W;x++){
    var md=1e12,best=0;
    for(var i=0;i<N;i++){var dx=x-pts[i].x,dy=y-pts[i].y,d2=dx*dx+dy*dy;if(d2<md){md=d2;best=i;}}
    var ii=y*W+x;own[ii]=best;dst[ii]=Math.sqrt(md);if(dst[ii]>mxD[best])mxD[best]=dst[ii];
  }
  var norm=new Float32Array(W*H);
  for(var i=0;i<W*H;i++)norm[i]=dst[i]/mxD[own[i]];
  var bnd=new Uint8Array(W*H);
  for(var y=1;y<H-1;y++)for(var x=1;x<W-1;x++){
    var ii=y*W+x,c=own[ii];
    if(own[ii-1]!==c||own[ii+1]!==c||own[ii-W]!==c||own[ii+W]!==c)bnd[ii]=1;
  }
  return {own:own,norm:norm,bnd:bnd};
}

// ── Gauge helpers ──────────────────────────────────────────────────────────
function setTemp(raw,sc){
  var t=Math.round(sc.t0-(sc.t0-sc.t1)*raw),pct=(t-400)/(1400-400)*100;
  document.getElementById('tf').style.height=Math.max(0,pct)+'%';
  document.getElementById('tr').innerHTML=t+'<br>°C';
}
function setDepth(km){
  document.getElementById('df').style.height=Math.min(km/15,1)*100+'%';
  document.getElementById('dr').innerHTML=km+'<br>km';
}
function showResult(sc){
  document.getElementById('tex').textContent=sc.tex;
  document.getElementById('rks').textContent=sc.rks;
  document.getElementById('nt').textContent=sc.nt;
  document.getElementById('res').classList.add('on');
  document.getElementById('rp').style.display='inline-block';
}
function showBuilding(){
  cx.fillStyle='#0d0a08';cx.fillRect(0,0,W,H);
  cx.fillStyle='rgba(200,140,50,.5)';cx.font='12px system-ui,sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('Building crystals\u2026',W/2,H/2);
}

// ── Slow / Fast crystallization (anisotropic Voronoi + mineral shaders) ───
function runCrystal(key,tk){
  var sc=SC[key];
  // Fast mode: more seeds (smaller grains), less elongated crystals (arMax)
  var target=sc.fast?350:200,arMax=sc.fast?1.4:null;
  var mnList=scaledMinerals(comp,target,arMax);
  var cacheKey=key+'_'+comp;
  setDepth('depth' in sc?sc.depth:0);
  showBuilding();
  // Double rAF lets the browser paint "Building crystals…" before the blocking Voronoi compute
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    if(token!==tk)return;
    var st=buildMineralData(cacheKey,mnList);
    if(token!==tk)return;
    var t0=performance.now(),dur=sc.dur;
    function frm(now){
      if(token!==tk)return;
      var raw=Math.min((now-t0)/dur,1),p=raw<.5?2*raw*raw:-1+(4-2*raw)*raw;
      setTemp(raw,sc);renderMinerals(st,p);
      if(raw<1)requestAnimationFrame(frm);
      else{setTemp(1,sc);renderMinerals(st,1);showResult(sc);}
    }
    requestAnimationFrame(frm);
  });});
}

// ── Glassy (no crystal structure — unchanged) ─────────────────────────────
function runGlassy(key,tk){
  var sc=SC[key],rand=rng(55);
  var shim=new Float32Array(W*H);
  for(var y=0;y<H;y++)for(var x=0;x<W;x++)
    shim[y*W+x]=Math.sin(x*.038+y*.033)*5+Math.sin(x*.014-y*.019)*3;
  var ves=Array.from({length:28},function(){return {x:rand()*W,y:rand()*H,r:4+rand()*13,at:.1+rand()*.55};});
  var img=cx.createImageData(W,H),pd=img.data;
  for(var i=0;i<W*H;i++)pd[i*4+3]=255;
  setDepth(0);
  var t0=performance.now();
  function frm(now){
    if(token!==tk)return;
    var raw=Math.min((now-t0)/sc.dur,1),p=raw*raw;
    setTemp(raw,sc);
    for(var i=0;i<W*H;i++){
      var b=i*4,sv=shim[i];
      pd[b]  =(145*(1-p)+(12+sv*.25)*p)|0;
      pd[b+1]=(46*(1-p)+9*p)|0;
      pd[b+2]=(8*(1-p)+(17+sv*.45)*p)|0;
    }
    cx.putImageData(img,0,0);
    ves.forEach(function(v){
      if(raw>v.at){
        var vp=Math.min((raw-v.at)/.22,1);
        cx.beginPath();cx.arc(v.x,v.y,v.r*vp,0,Math.PI*2);
        cx.fillStyle='rgba(4,4,9,'+vp*.5+')';cx.fill();
        cx.strokeStyle='rgba(28,24,38,'+vp*.45+')';cx.lineWidth=1;cx.stroke();
      }
    });
    if(raw<1)requestAnimationFrame(frm);else showResult(sc);
  }
  requestAnimationFrame(frm);
}

// ── Porphyritic (two-population Voronoi + mineral colors + optical FX) ────
function runPorphyritic(key,tk){
  var sc=SC[key];
  var rand=rng(hashStr('porph_'+comp));
  var nPh=6,nMx=240;

  // Phenocryst mineral = most prominent mineral in this composition
  var phMin=MA[comp][0];

  // Distribute groundmass grains proportionally across all composition minerals
  var mxKeys=[],mxBase=MA[comp];
  var mxTotal=mxBase.reduce(function(s,m){return s+m.cnt;},0);
  mxBase.forEach(function(m){
    var c=Math.max(1,Math.round(m.cnt/mxTotal*nMx));
    for(var i=0;i<c;i++)mxKeys.push(m.key);
  });
  while(mxKeys.length<nMx)mxKeys.push(mxBase[0].key);
  mxKeys=mxKeys.slice(0,nMx);
  // Shuffle mineral assignments so grains don't cluster by type
  for(var i=mxKeys.length-1;i>0;i--){var j=(rand()*(i+1))|0,tmp=mxKeys[i];mxKeys[i]=mxKeys[j];mxKeys[j]=tmp;}

  // Build per-grain color and orientation for mineral shaders
  function grainColor(key){
    var col=MC[key],c=col[(rand()*col.length)|0],nz=(rand()-.5)*28;
    return [Math.min(255,Math.max(0,(c[0]+nz)|0)),Math.min(255,Math.max(0,(c[1]+nz)|0)),Math.min(255,Math.max(0,(c[2]+nz)|0))];
  }

  var phPts=[],phCos=[],phSin=[],phCol=[];
  for(var i=0;i<nPh;i++){
    phPts.push({x:70+rand()*(W-140),y:70+rand()*(H-140)});
    var th=rand()*Math.PI;phCos.push(Math.cos(th));phSin.push(Math.sin(th));
    phCol.push(grainColor(phMin.key));
  }

  var mxPts=[],mxCos=[],mxSin=[],mxCol=[];
  for(var i=0;i<nMx;i++){
    mxPts.push({x:rand()*W,y:rand()*H});
    var th=rand()*Math.PI;mxCos.push(Math.cos(th));mxSin.push(Math.sin(th));
    mxCol.push(grainColor(mxKeys[i]));
  }

  showBuilding();
  if(token!==tk)return;
  var phV=buildVoronoi(phPts);
  if(token!==tk)return;
  var allPts=phPts.concat(mxPts);
  var allV=buildVoronoi(allPts);
  if(token!==tk)return;

  var img=cx.createImageData(W,H),pd=img.data;
  for(var i=0;i<W*H;i++){pd[i*4]=145;pd[i*4+1]=46;pd[i*4+2]=8;pd[i*4+3]=255;}

  var P1=4200,P2=2300,TOTAL=P1+P2,PHRESH=0.42;
  setDepth(12);
  var t0=performance.now();

  function frm(now){
    if(token!==tk)return;
    var el=now-t0,rawAll=Math.min(el/TOTAL,1);
    var p1r=Math.min(el/P1,1),p2r=el<=P1?0:Math.min((el-P1)/P2,1);
    var p1=p1r<.5?2*p1r*p1r:-1+(4-2*p1r)*p1r;
    var p2=p2r<.5?2*p2r*p2r:-1+(4-2*p2r)*p2r;
    var temp=el<=P1?Math.round(1200-250*p1r):Math.round(950-330*p2r);
    document.getElementById('tf').style.height=Math.max(0,(temp-400)/(1400-400)*100)+'%';
    document.getElementById('tr').innerHTML=temp+'<br>°C';
    setDepth(el<=P1?12:Math.round(12*(1-p2r*p2r)));
    var pThresh=PHRESH*p1;
    for(var i=0;i<W*H;i++){
      var b=i*4;
      var phRevealed=phV.norm[i]<=pThresh;
      var fullOwner=allV.own[i],isPhOwned=fullOwner<nPh;
      var isPhEdge=!phRevealed&&isPhOwned&&p2>0.01;
      var nz=((i*73+17)&0xff)*.013-.85;
      if(phRevealed||isPhEdge){
        var ci=phV.own[i],f=(phRevealed?phV.bnd[i]:allV.bnd[i])?.38:1;
        var c=phCol[ci];
        var rgb=applyMineralFX(c[0],c[1],c[2],phMin.key,i,phPts[ci].x,phPts[ci].y,phCos[ci],phSin[ci]);
        pd[b]=Math.min(255,Math.max(0,(rgb[0]*f+nz)|0));
        pd[b+1]=Math.min(255,Math.max(0,(rgb[1]*f+nz)|0));
        pd[b+2]=Math.min(255,Math.max(0,(rgb[2]*f+nz)|0));
      }else if(!isPhOwned&&allV.norm[i]<=p2){
        var ci=fullOwner-nPh,f=allV.bnd[i]?.35:1,mk=mxKeys[ci],c=mxCol[ci];
        var rgb=applyMineralFX(c[0],c[1],c[2],mk,i,mxPts[ci].x,mxPts[ci].y,mxCos[ci],mxSin[ci]);
        pd[b]=Math.min(255,Math.max(0,(rgb[0]*f+nz)|0));
        pd[b+1]=Math.min(255,Math.max(0,(rgb[1]*f+nz)|0));
        pd[b+2]=Math.min(255,Math.max(0,(rgb[2]*f+nz)|0));
      }else{
        var gv=1-rawAll*.42;
        pd[b]=(145*gv)|0;pd[b+1]=(46*gv)|0;pd[b+2]=(8*gv)|0;
      }
    }
    cx.putImageData(img,0,0);
    if(el>P1-40&&el<P1+280){
      var fa=Math.max(0,1-(el-P1+40)/320);
      cx.fillStyle='rgba(255,120,8,'+fa*.6+')';cx.fillRect(0,0,W,H);
    }
    if(rawAll<1)requestAnimationFrame(frm);else showResult(sc);
  }
  requestAnimationFrame(frm);
}

// ── Main entry ─────────────────────────────────────────────────────────────
function run(key){
  var tk=++token;cur=key;
  var r=document.getElementById('res');
  r.classList.remove('on');r.style.opacity='0';r.style.transform='translateY(5px)';
  document.getElementById('rp').style.display='none';
  document.getElementById('desc').textContent=SC[key].desc;
  cx.fillStyle='#0e0b0a';cx.fillRect(0,0,W,H);
  setTimeout(function(){
    if(token!==tk)return;
    if(key==='glassy')runGlassy(key,tk);
    else if(key==='porphyritic')runPorphyritic(key,tk);
    else runCrystal(key,tk);
  },12);
}

// ── Idle state ─────────────────────────────────────────────────────────────
cx.fillStyle='#111010';cx.fillRect(0,0,W,H);
cx.fillStyle='rgba(140,120,90,.5)';cx.font='12px system-ui,sans-serif';
cx.textAlign='center';cx.textBaseline='middle';
cx.fillText('Select a cooling environment to begin',W/2,H/2);

// ── Button listeners ───────────────────────────────────────────────────────
document.querySelectorAll('.sbtn[data-k]').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.sbtn[data-k]').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');run(b.dataset.k);
  });
});
document.querySelectorAll('.cbtn[data-c]').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.cbtn[data-c]').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');comp=b.dataset.c;
    SD={};// Flush cache — new composition needs fresh Voronoi
    if(cur)run(cur);
  });
});
document.getElementById('rp').addEventListener('click',function(){if(cur)run(cur);});
</script>
