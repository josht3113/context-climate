<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metamorphic Transformation Simulator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f3ef;font-family:system-ui,-apple-system,sans-serif;color:#1a1816;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 48px}
h1{font-size:22px;font-weight:600;color:#1a1816;margin-bottom:3px;text-align:center}
.tagline{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#7a7060;margin-bottom:24px;font-weight:500}
.rlbl{font-size:11px;color:#8a7a6a;letter-spacing:.1em;text-transform:uppercase;margin:0 0 5px;font-weight:500}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.sbtn{background:#fff;border:1px solid #ccc8c0;color:#5a5248;font-size:12px;letter-spacing:.08em;padding:8px 13px;cursor:pointer;border-radius:6px;font-family:inherit;text-transform:uppercase;transition:all .15s;white-space:nowrap}
.sbtn:hover{border-color:#8a7a6a;color:#1a1816}
.sbtn.on{background:#ede9e1;border-color:#8a7a6a;color:#1a1816;font-weight:600}
#desc{font-size:14px;color:#5a5248;min-height:20px;margin-bottom:13px;line-height:1.5;max-width:520px;text-align:center}
.main-row{display:flex;gap:10px;align-items:flex-start}
.gauge-col{display:flex;flex-direction:column;align-items:center;width:36px;gap:3px;flex-shrink:0}
.gauge-lbl{font-size:10px;color:#8a7a6a;letter-spacing:.1em;text-transform:uppercase}
.gauge-track{width:10px;background:#e8e4dc;border:1px solid #d4cfc8;border-radius:5px;overflow:hidden;position:relative}
.gauge-fill{position:absolute;bottom:0;left:0;right:0;height:0%}
.gauge-val{font-size:12px;color:#7a7060;text-align:center;line-height:1.3;min-height:28px}
.gauge-div{width:100%;height:1px;background:#d4cfc8;margin:4px 0}
canvas{display:block;border:1px solid #d4cfc8;border-radius:8px}
#imbar{display:none;margin-top:8px}
.im-row{display:flex;gap:4px}
.im-cell{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;padding:7px 5px;border:1px solid #d4cfc8;border-radius:6px;opacity:.22;transition:opacity .5s,border-color .5s;min-width:0}
.im-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.im-nm{font-size:10px;text-align:center;color:#8a7a6a;line-height:1.2;word-break:break-all}
.result-box{margin-top:20px;text-align:center;opacity:0;transform:translateY(5px);transition:opacity .65s,transform .65s;pointer-events:none}
.result-box.on{opacity:1;transform:none;pointer-events:auto}
.grade-badge{display:inline-block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:4px 14px;border-radius:6px;margin-bottom:8px}
.tex{font-size:24px;font-weight:600;color:#1a1816;margin-bottom:4px}
.rkn{font-size:12px;color:#5a5248;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.mni{font-size:13px;color:#7a7060;margin-bottom:4px}
.nti{font-size:13px;color:#7a7060;margin-bottom:12px;max-width:460px;margin-left:auto;margin-right:auto;line-height:1.5}
.essrt-tag{display:inline-block;border:1px solid #ccc8c0;padding:4px 14px;border-radius:6px;font-size:12px;color:#7a7060;letter-spacing:.08em}
.act-row{text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center}
</style>
</head>
<body>
<h1>Metamorphic Transformation Simulator</h1>
<p class="tagline">Heat + pressure — mineral transformation — new rock type</p>

<p class="rlbl">Shale sequence — Barrovian regional metamorphism</p>
<div class="btn-row">
  <button class="sbtn" data-k="shlSl">Shale to Slate</button>
  <button class="sbtn" data-k="slPh">Slate to Phyllite</button>
  <button class="sbtn" data-k="phSch">Phyllite to Schist</button>
  <button class="sbtn" data-k="schGn">Schist to Gneiss</button>
</div>

<p class="rlbl">Other transformations</p>
<div class="btn-row">
  <button class="sbtn" data-k="grGn">Granite to Gneiss</button>
  <button class="sbtn" data-k="lmMbl">Limestone to Marble</button>
  <button class="sbtn" data-k="sndQtz">Sandstone to Quartzite</button>
</div>

<p id="desc">Select a transformation above</p>

<div class="main-row">
  <div>
    <canvas id="cv" width="420" height="420"></canvas>
    <div id="imbar">
      <p class="rlbl" style="margin:8px 0 5px">Index mineral progression</p>
      <div class="im-row" id="imrow"></div>
    </div>
    <canvas id="ptcv" width="420" height="150" style="margin-top:8px"></canvas>
  </div>
  <div class="gauge-col">
    <div class="gauge-lbl">temp</div>
    <div class="gauge-track" style="flex:0 0 215px">
      <div id="tf" class="gauge-fill" style="background:linear-gradient(to top,#c82800,#e86000,#f5a200);transition:height 90ms linear"></div>
    </div>
    <div id="tr" class="gauge-val">--</div>
    <div class="gauge-div"></div>
    <div class="gauge-lbl">press</div>
    <div class="gauge-track" style="height:100px">
      <div id="pf" class="gauge-fill" style="background:linear-gradient(to top,#182850,#3060b8);transition:height 180ms ease-out"></div>
    </div>
    <div id="pr" class="gauge-val">--</div>
    <div class="gauge-lbl">kbar</div>
  </div>
</div>

<div class="result-box" id="res">
  <div class="grade-badge" id="grd"></div>
  <div class="tex" id="tex"></div>
  <div class="rkn" id="rkn"></div>
  <div class="mni" id="mni"></div>
  <div class="nti" id="nti"></div>
  <div class="essrt-tag">ESSRT p. 14 — Rock cycle and metamorphic rocks</div>
</div>

<div class="act-row">
  <button id="rp" class="sbtn" style="display:none">Replay</button>
  <button id="up" class="sbtn" style="display:none">Simulate uplift</button>
</div>

<script>
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const ptcv=document.getElementById('ptcv'),ptx=ptcv.getContext('2d');
const W=420,H=420;

let token=0,curKey=null,finalT=null,finalP=null;
var GG=null,LMMBL=null,SNDQTZ=null,SCHGN2=null,BARROV=null;

const PL=44,PT_=8,PRPW=366,PRPH=100;
function txPT(T){return PL+(T-100)/800*PRPW}
function pyPT(P){return PT_+(1-P/14)*PRPH}

const BARROVIAN=[{t:150,p:1.5},{t:280,p:4},{t:380,p:5.5},{t:560,p:8.5},{t:720,p:11.5}];

const SC={
  shlSl:{from:'shale',to:'slate',pelitic:true,stress:true,dur:5000,
    desc:'Burial pressure compacts clay minerals; flat cleavage planes develop perpendicular to compressive stress',
    tex:'Slaty cleavage',rk:'Slate',mn:'Chlorite · Muscovite · Fine quartz',
    nt:'Fine parallel cleavage forms perpendicular to maximum compressive stress — a key distinction from original sedimentary bedding planes',
    grade:'Low grade',gc:{bg:'#d4f0d4',tc:'#1a5a1a'},
    fe:{sp:3.5,amp:0,freq:2,al:0.55,col:'#7080a0',lw:0.5},
    garnets:false,mica:false,gS:0,gE:0.25},
  slPh:{from:'slate',to:'phyllite',pelitic:true,stress:true,dur:5500,
    desc:'Rising temperature recrystallizes micas; foliation becomes wavy and acquires a characteristic silky sheen',
    tex:'Phyllitic foliation',rk:'Phyllite',mn:'Muscovite · Chlorite · Albite',
    nt:'Growing mica flakes produce wavy foliation surfaces with a distinctive silky luster on cleavage planes',
    grade:'Low-medium grade',gc:{bg:'#d4f0d4',tc:'#1a5a1a'},
    fs:{sp:3.5,amp:0,freq:2,al:0.55,col:'#7080a0',lw:0.5},
    fe:{sp:6,amp:7,freq:1.5,al:0.65,col:'#b0b8c8',lw:0.8},
    garnets:false,mica:true,gS:0.25,gE:0.5},
  phSch:{from:'phyllite',to:'schist',pelitic:true,stress:true,dur:6000,
    desc:'Higher P/T recrystallizes coarse mica flakes and nucleates garnet porphyroblasts; bold schistosity develops',
    tex:'Schistosity',rk:'Schist',mn:'Biotite · Garnet · Staurolite · Kyanite',
    nt:'Garnet porphyroblasts are index minerals — their presence signals medium-grade regional metamorphism',
    grade:'Medium grade',gc:{bg:'#f0e0b0',tc:'#5a3a00'},
    fs:{sp:6,amp:7,freq:1.5,al:0.65,col:'#b0b8c8',lw:0.8},
    fe:{sp:14,amp:14,freq:1.2,al:0.5,col:'#c0c0cc',lw:1.0},
    garnets:true,mica:true,gS:0.5,gE:0.75},
  schGn:{from:'schist',to:'gneiss',pelitic:true,stress:true,dur:7000,
    desc:'Near-melting temperatures drive felsic and mafic minerals to segregate into alternating compositional bands',
    tex:'Gneissic banding',rk:'Gneiss',mn:'K-feldspar · Hornblende · Plagioclase · Quartz',
    nt:'Banding reflects segregation of felsic and mafic minerals under extreme heat and pressure — the rock is at the edge of melting',
    grade:'High grade',gc:{bg:'#f0c8c0',tc:'#5a1a10'},
    fs:{sp:14,amp:14,freq:1.2,al:0.5,col:'#c0c0cc',lw:1.0},
    garnets:false,mica:false,gS:0.75,gE:1.0},
  grGn:{from:'granite',to:'gneiss',pelitic:false,stress:true,dur:7000,
    desc:'Directed stress and extreme heat cause mineral segregation in granite; the unfoliated igneous texture gives way to gneissic banding',
    tex:'Gneissic banding',rk:'Gneiss',mn:'K-feldspar · Hornblende · Plagioclase · Quartz',
    nt:'The same rock type can form from a sedimentary parent (schist to gneiss) or an igneous parent (granite to gneiss) — the protolith is preserved in the chemistry, not the texture',
    grade:'High grade',gc:{bg:'#f0c8c0',tc:'#5a1a10'},
    fe:{sp:14,amp:14,freq:1.2,al:0.5,col:'#c0c0cc',lw:1.0},
    garnets:false,mica:false,gS:null,gE:null},
  lmMbl:{from:'limestone',to:'marble',pelitic:false,stress:false,dur:5000,
    desc:'Heat and pressure recrystallize calcite grains into an interlocking mosaic; any fossils are destroyed',
    tex:'Granoblastic',rk:'Marble',mn:'Calcite · Dolomite · Tremolite',
    nt:'Non-foliated; no directed stress means no mineral alignment — calcite grains simply grow coarser as temperature rises',
    grade:'Regional low-medium',gc:{bg:'#d4f0d4',tc:'#1a5a1a'},
    garnets:false,mica:false,gS:null,gE:null},
  sndQtz:{from:'sandstone',to:'quartzite',pelitic:false,stress:false,dur:5000,
    desc:'Pressure and heat weld quartz grains together; pore space closes and crystals interlock',
    tex:'Granoblastic',rk:'Quartzite',mn:'Quartz · Muscovite · K-feldspar',
    nt:'Non-foliated; quartzite fractures through quartz grains rather than around them — one of the hardest common rocks',
    grade:'Regional low-medium',gc:{bg:'#d4f0d4',tc:'#1a5a1a'},
    garnets:false,mica:false,gS:null,gE:null}
};

const PTPATHS={
  shlSl:[{t:150,p:1.5},{t:280,p:4}],
  slPh: [{t:280,p:4},{t:380,p:5.5}],
  phSch:[{t:380,p:5.5},{t:560,p:8.5}],
  schGn:[{t:560,p:8.5},{t:720,p:11.5}],
  grGn: [{t:500,p:6},{t:700,p:10}],
  lmMbl:[{t:200,p:3},{t:580,p:7}],
  sndQtz:[{t:250,p:4},{t:550,p:8}]
};

const IMINERALS=[
  {name:'Chlorite',thresh:0,color:'#2e7a38'},
  {name:'Biotite',thresh:0.1,color:'#6a3a10'},
  {name:'Garnet',thresh:0.45,color:'#7a0c0c'},
  {name:'Staurolite',thresh:0.58,color:'#9a6010'},
  {name:'Kyanite',thresh:0.65,color:'#2848b0'},
  {name:'Sillimanite',thresh:0.80,color:'#585850'}
];

(function(){
  var row=document.getElementById('imrow');
  IMINERALS.forEach(function(m,i){
    var c=document.createElement('div');c.className='im-cell';c.id='im_'+i;
    var d=document.createElement('div');d.className='im-dot';d.style.background=m.color;
    var l=document.createElement('div');l.className='im-nm';l.textContent=m.name;
    c.appendChild(d);c.appendChild(l);row.appendChild(c);
  });
})();

function rng(s){var x=s|0;return function(){x=Math.imul(x,1664525)+1013904223;return(x>>>0)/4294967296};}
function lerp(a,b,t){return a+(b-a)*t;}

var SEEDS={shale:1001,slate:1002,phyllite:1003,schist:1004,gneiss:1005,
           limestone:1006,marble:1007,sandstone:1008,quartzite:1009,granite:1011};
var TC={};

var PAL_FELSIC=function(v){
  if(v<.35)return[214,158,126];if(v<.60)return[222,212,196];
  if(v<.85)return[178,188,200];if(v<.95)return[26,32,18];return[38,24,10];
};

function buildVoronoi(pts){
  var N=pts.length,own=new Int32Array(W*H),dst=new Float32Array(W*H),mxD=new Float32Array(N);
  for(var y=0;y<H;y++)for(var x=0;x<W;x++){
    var md=1e12,best=0;
    for(var i=0;i<N;i++){var dx=x-pts[i].x,dy=y-pts[i].y,d2=dx*dx+dy*dy;if(d2<md){md=d2;best=i;}}
    var idx=y*W+x;own[idx]=best;dst[idx]=Math.sqrt(md);if(dst[idx]>mxD[best])mxD[best]=dst[idx];
  }
  var norm=new Float32Array(W*H);
  for(var i=0;i<W*H;i++)norm[i]=dst[i]/mxD[own[i]];
  var bnd=new Uint8Array(W*H);
  for(var y=1;y<H-1;y++)for(var x=1;x<W-1;x++){
    var i=y*W+x,c=own[i];
    if(own[i-1]!==c||own[i+1]!==c||own[i-W]!==c||own[i+W]!==c)bnd[i]=1;
  }
  return{own:own,norm:norm,bnd:bnd};
}

function genTex(type){
  var rand=rng(SEEDS[type]);
  var px=new Uint8ClampedArray(W*H*4);
  if(type==='marble'||type==='quartzite'||type==='granite'){
    var n=type==='granite'?30:type==='marble'?50:68;
    var seeds=[];for(var i=0;i<n;i++)seeds.push({x:rand()*W,y:rand()*H});
    var vr=buildVoronoi(seeds);
    var cols=[];
    if(type==='granite'){
      for(var i=0;i<n;i++){
        var pick=rand(),jt=(rand()-0.5)*14,gc2;
        if(pick<0.42){gc2=[208+rand()*20,140+rand()*22,112+rand()*16];}        // K-feldspar: salmon/pink
        else if(pick<0.68){var qv=216+rand()*24;gc2=[qv+3,qv+4,qv+5];}        // Quartz: glassy white-gray
        else if(pick<0.84){var pv=222+rand()*14;gc2=[pv,pv-3,pv-6];}           // Plagioclase: white
        else{var bv=12+rand()*22;gc2=[bv,bv-2,bv-3];}                          // Biotite/hornblende: black
        cols.push(gc2.map(function(ch){return Math.min(255,Math.max(0,(ch+jt)|0));}));
      }
    }else{
      for(var i=0;i<n;i++){var v=(rand()-0.5)*28;cols.push(type==='marble'?[210+v,207+v,196+v]:[182+v,182+v,188+v]);}
    }
    var bf=type==='granite'?0.50:0.45;
    for(var i=0;i<W*H;i++){var b=i*4,c=cols[vr.own[i]],f=vr.bnd[i]?bf:1;px[b]=(c[0]*f)|0;px[b+1]=(c[1]*f)|0;px[b+2]=(c[2]*f)|0;px[b+3]=255;}
    return px;
  }
  for(var y=0;y<H;y++)for(var x=0;x<W;x++){
    var i=(y*W+x)*4,n=rand()-0.5,r,g,b;
    if(type==='shale'){var lam=Math.sin(y*1.1)*3,v=38+lam+n*12;r=v-2;g=v-1;b=v+1;}
    else if(type==='slate'){var v=30+n*8;r=v;g=v;b=v+10;}
    else if(type==='phyllite'){var v=48+n*10;r=v;g=v;b=v+5;}
    else if(type==='schist'){var gr=Math.sin(x*.3)*Math.cos(y*.3)*10,v=55+gr+n*16;r=v;g=v-4;b=v-7;}
    else if(type==='gneiss'){var warp=Math.sin(x*.017)*26+Math.sin(x*.007+1.4)*16+Math.sin(x*.039+0.8)*8;var bY=((y+warp)%46+46)%46;var bW=25+Math.sin(x*.013+0.5)*7;if(bY<bW){if(rand()<0.50){r=196+n*15;g=155+n*15;b=130+n*13;}else{var qv2=210+n*18;r=qv2+5;g=qv2+3;b=qv2-1;}}else{var dv=14+n*9;r=dv+3;g=dv-1;b=dv-2;}}
    else if(type==='limestone'){var v=145+n*16;r=v+5;g=v+3;b=v;}
    else if(type==='sandstone'){var gr=Math.sin(x*.25)*Math.sin(y*.25)*14,v=165+gr+n*12;r=v+22;g=v+10;b=v-12;}
    else{r=g=b=128;}
    px[i]=Math.min(255,Math.max(0,r|0));px[i+1]=Math.min(255,Math.max(0,g|0));px[i+2]=Math.min(255,Math.max(0,b|0));px[i+3]=255;
  }
  return px;
}

function getTex(t){if(!TC[t])TC[t]=genTex(t);return TC[t];}

function drawFoliation(ctx,fo){
  if(!fo||fo.al<=0||fo.sp<0.5)return;
  ctx.save();ctx.strokeStyle=fo.col;ctx.lineWidth=fo.lw;ctx.globalAlpha=fo.al;
  var li=0;
  for(var y0=-fo.amp;y0<H+fo.amp;y0+=fo.sp,li++){
    ctx.beginPath();var ph=li*0.42;
    for(var x=0;x<=W;x+=3){var y=y0+fo.amp*Math.sin(2*Math.PI*fo.freq*x/W+ph);if(x===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.stroke();
  }
  ctx.restore();
}

function drawGarnets(ctx,garnets,p){
  for(var gi=0;gi<garnets.length;gi++){
    var g=garnets[gi];
    if(p<=g.at)continue;
    var gp=Math.min((p-g.at)/.38,1),r=g.maxR*gp;
    ctx.beginPath();
    for(var i=0;i<=g.sides;i++){var ang=i/g.sides*Math.PI*2+Math.PI/8,rr=r*g.verts[i%g.sides];if(i===0)ctx.moveTo(g.x+rr*Math.cos(ang),g.y+rr*Math.sin(ang));else ctx.lineTo(g.x+rr*Math.cos(ang),g.y+rr*Math.sin(ang));}
    ctx.closePath();ctx.fillStyle='rgba(116,36,26,'+(0.88*gp)+')';ctx.fill();
    ctx.strokeStyle='rgba(68,18,14,'+(0.6*gp)+')';ctx.lineWidth=0.8;ctx.stroke();
  }
}

function drawMica(ctx,micas,p,fo){
  if(!fo||p<=0||fo.sp<0.5)return;
  var nL=Math.max(1,Math.floor(H/fo.sp));
  ctx.save();ctx.globalAlpha=p*0.5;
  for(var mi=0;mi<micas.length;mi++){
    var m=micas[mi];
    if(m.pi>=nL)continue;
    var y0=m.pi*fo.sp,ph=m.pi*0.42;
    var y=y0+fo.amp*Math.sin(2*Math.PI*fo.freq*m.x/W+ph);
    if(y<0||y>H)continue;
    ctx.strokeStyle='rgb('+m.b+','+m.b+','+(m.b-8)+')';ctx.lineWidth=m.lw;
    ctx.beginPath();ctx.moveTo(m.x-m.len/2,y);ctx.lineTo(m.x+m.len/2,y);ctx.stroke();
  }
  ctx.restore();
}

function drawStress(ctx,raw,show){
  if(!show)return;
  var al=Math.min(raw*6,0.48);if(al<=0)return;
  ctx.save();ctx.fillStyle='#c8a018';ctx.strokeStyle='#c8a018';ctx.globalAlpha=al;
  function arr(x,y1,y2){var d=y2>y1?1:-1;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x,y1);ctx.lineTo(x,y2-d*7);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y2);ctx.lineTo(x-4,y2-d*7);ctx.lineTo(x+4,y2-d*7);ctx.closePath();ctx.fill();}
  for(var x=35;x<W;x+=70){arr(x,4,20);arr(x,H-4,H-20);}
  ctx.restore();
}

function setGauges(T,P){
  document.getElementById('tf').style.height=Math.max(0,(T-50)/850*100)+'%';
  document.getElementById('tr').innerHTML=Math.round(T)+'<br>C';
  document.getElementById('pf').style.height=Math.max(0,P/14*100)+'%';
  document.getElementById('pr').innerHTML=P.toFixed(1)+'<br>kb';
}

function updateIM(gp){
  for(var i=0;i<IMINERALS.length;i++){
    var el=document.getElementById('im_'+i);if(!el)continue;
    var on=gp>=IMINERALS[i].thresh;
    el.style.opacity=on?'1':'0.22';
    el.style.borderColor=on?IMINERALS[i].color:'#d4cfc8';
  }
}

function drawPT(curT,curP,key){
  ptx.clearRect(0,0,ptcv.width,ptcv.height);
  var x300=txPT(300),x600=txPT(600);
  ptx.fillStyle='rgba(60,140,60,0.15)';ptx.fillRect(PL,PT_,x300-PL,PRPH);
  ptx.fillStyle='rgba(190,150,20,0.15)';ptx.fillRect(x300,PT_,x600-x300,PRPH);
  ptx.fillStyle='rgba(180,50,30,0.15)';ptx.fillRect(x600,PT_,PL+PRPW-x600,PRPH);
  ptx.strokeStyle='rgba(100,90,80,0.25)';ptx.lineWidth=0.5;ptx.strokeRect(PL,PT_,PRPW,PRPH);
  ptx.font='12px system-ui,sans-serif';ptx.fillStyle='rgba(80,70,60,0.6)';ptx.textAlign='center';

// ── GRANITE → GNEISS  physical Voronoi animation ─────────────────────────────
function setupGG(){
  var rand=rng(9173);
  var N=30,nBands=7,bandH=H/nBands;
  var seeds=[],sXY=new Float32Array(N*2),sRGB=new Uint8Array(N*3);
  for(var i=0;i<N;i++){
    var x=15+rand()*(W-30),y=15+rand()*(H-30);
    var pick=rand(),r,g,b,isMafic=false;
    var jt=(rand()-0.5)*14;
    if(pick<0.42){                                      // K-feldspar: salmon/pink
      r=Math.round(208+rand()*18+jt);g=Math.round(138+rand()*22+jt);b=Math.round(110+rand()*16+jt);
    }else if(pick<0.68){                                // Quartz: glassy white-gray
      var qv=Math.round(216+rand()*26);r=qv+3;g=qv+4;b=qv+5;
    }else if(pick<0.84){                                // Plagioclase: white
      var pv=Math.round(220+rand()*16);r=pv;g=pv-3;b=pv-6;
    }else{                                              // Biotite/hornblende: near-black
      var bv=Math.round(10+rand()*20);r=bv;g=Math.max(0,bv-2);b=Math.max(0,bv-3);isMafic=true;
    }
    // Assign target band: dark → odd bands (1,3,5)  light → even bands (0,2,4,6)
    var tgt=isMafic?[1,3,5]:[0,2,4,6];
    var tb=tgt[Math.floor(rand()*tgt.length)];
    var ty=Math.max(10,Math.min(H-10,(tb+0.5)*bandH+(rand()-0.5)*bandH*0.55));
    seeds.push({ox:x,oy:y,ty:ty});
    sXY[i*2]=x;sXY[i*2+1]=y;
    sRGB[i*3]=Math.min(255,Math.max(0,r));
    sRGB[i*3+1]=Math.min(255,Math.max(0,g));
    sRGB[i*3+2]=Math.min(255,Math.max(0,b));
  }
  GG={seeds:seeds,sXY:sXY,sRGB:sRGB,N:N};
}

function renderGG(p){
  var N=GG.N,sXY=GG.sXY,sRGB=GG.sRGB,seeds=GG.seeds;
  // Migration: delayed start so grains first deform, then sort into bands
  var pM=Math.max(0,(p-0.10)/0.90);pM=pM<0.5?2*pM*pM:-1+(4-2*pM)*pM;
  // Anisotropic scale: grains flatten vertically and stretch horizontally
  var sX=1+p*3.2,sY=Math.max(0.24,1-p*0.75);
  var ix2=1/(sX*sX),iy2=1/(sY*sY);
  // Warp grows from 0 → 26px amplitude
  var wA=p*26;
  var warpCol=new Float32Array(W);
  for(var x=0;x<W;x++)warpCol[x]=wA*(Math.sin(x*0.018)*0.62+Math.sin(x*0.0072+1.4)*0.38);
  // Update current seed y positions
  for(var i=0;i<N;i++)sXY[i*2+1]=seeds[i].oy+(seeds[i].ty-seeds[i].oy)*pM;
  // Pixel loop (tight, typed-array friendly)
  var img=cx.createImageData(W,H),d=img.data;
  for(var py=0;py<H;py++){
    for(var px_=0;px_<W;px_++){
      var wy=py+warpCol[px_],bD=1e9,bS=0,sD=1e9;
      for(var s=0,si=0;s<N;s++,si+=2){
        var dx=px_-sXY[si],dy=wy-sXY[si+1],dd=dx*dx*ix2+dy*dy*iy2;
        if(dd<bD){sD=bD;bD=dd;bS=s;}else if(dd<sD)sD=dd;
      }
      // Grain boundary darkening (where cells meet)
      var bf=sD>0&&(bD/sD)>0.68?0.50:1.0;
      // Subtle intra-grain noise (hash-based, zero cost)
      var nz=((py*53+px_*97)&255)*0.031-4;
      var bi=(py*W+px_)*4,ci=bS*3;
      d[bi  ]=Math.min(255,Math.max(0,((sRGB[ci  ]+nz)*bf)|0));
      d[bi+1]=Math.min(255,Math.max(0,((sRGB[ci+1]+nz)*bf)|0));
      d[bi+2]=Math.min(255,Math.max(0,((sRGB[ci+2]+nz)*bf)|0));
      d[bi+3]=255;
    }
  }
  cx.putImageData(img,0,0);
}

// ── BARROVIAN CHAIN  shale → slate → phyllite → schist ────────────────────────
// 60 shared seeds (same RNG 3001) used by all three early transitions.
// phSch migrates these seeds toward the 38 SCHGN2 parent positions, creating
// perfect visual continuity all the way through to gneiss.
function setupBARROV(){
  if(BARROV)return;
  var rand=rng(3001),N=60;
  var seeds=[],sXY=new Float32Array(N*2);
  var shRGB=new Uint8Array(N*3),slRGB=new Uint8Array(N*3),phRGB=new Uint8Array(N*3);
  for(var i=0;i<N;i++){
    var x=10+rand()*(W-20),y=10+rand()*(H-20);
    seeds.push({ox:x,oy:y});
    sXY[i*2]=x;sXY[i*2+1]=y;
    // Shale: very dark clay green-gray
    var sv=44+rand()*14,sj=(rand()-0.5)*8;
    shRGB[i*3]=Math.min(255,Math.max(0,(sv+4+sj)|0));shRGB[i*3+1]=Math.min(255,Math.max(0,(sv+9+sj)|0));shRGB[i*3+2]=Math.min(255,Math.max(0,(sv+sj)|0));
    // Slate: dark blue-charcoal
    var lv=42+rand()*14,lj=(rand()-0.5)*10;
    slRGB[i*3]=Math.min(255,Math.max(0,(lv+2+lj)|0));slRGB[i*3+1]=Math.min(255,Math.max(0,(lv+2+lj)|0));slRGB[i*3+2]=Math.min(255,Math.max(0,(lv+14+lj)|0));
    // Phyllite: silver gray-green (growing mica)
    var pv=138+rand()*26,pj=(rand()-0.5)*20;
    phRGB[i*3]=Math.min(255,Math.max(0,(pv+pj)|0));phRGB[i*3+1]=Math.min(255,Math.max(0,(pv+10+pj)|0));phRGB[i*3+2]=Math.min(255,Math.max(0,(pv-10+pj)|0));
  }
  BARROV={seeds:seeds,sXY:sXY,shRGB:shRGB,slRGB:slRGB,phRGB:phRGB,N:N};
}

function setupPhSch(){
  if(!BARROV)setupBARROV();
  if(!SCHGN2)setupSchGn2();
  if(BARROV.phParents)return;
  // Assign each of the 60 phyllite seeds to its nearest schist (SCHGN2) parent
  var parents=new Int16Array(BARROV.N);
  for(var i=0;i<BARROV.N;i++){
    var bx=BARROV.seeds[i].ox,by=BARROV.seeds[i].oy,nd=1e9,ni=0;
    for(var j=0;j<SCHGN2.N;j++){
      var dx=bx-SCHGN2.sXY[j*2],dy=by-SCHGN2.sXY[j*2+1],d2=dx*dx+dy*dy;
      if(d2<nd){nd=d2;ni=j;}
    }
    parents[i]=ni;
  }
  BARROV.phParents=parents;
}

  var ix2=1/(sX*sX),iy2=1/(sY*sY);
  var wA=10-p*4,warpCol=new Float32Array(W);
  for(var x=0;x<W;x++)warpCol[x]=wA*(Math.sin(x*0.018)*0.62+Math.sin(x*0.0072+1.4)*0.38);
  var gXY=SCHGN2.sXY;
  for(var i=0;i<N;i++){
    sXY[i*2]=seeds[i].ox+(gXY[parents[i]*2]-seeds[i].ox)*pM;
    sXY[i*2+1]=seeds[i].oy+(gXY[parents[i]*2+1]-seeds[i].oy)*pM;
  }
  var img=cx.createImageData(W,H),d=img.data,phRGB=BARROV.phRGB,gRGB=SCHGN2.sRGB;
  for(var py=0;py<H;py++){for(var px_=0;px_<W;px_++){
    var wy=py+warpCol[px_],bD=1e9,bS=0,sD=1e9;
    for(var s=0,si=0;s<N;s++,si+=2){var dx=px_-sXY[si],dy=wy-sXY[si+1],dd=dx*dx*ix2+dy*dy*iy2;if(dd<bD){sD=bD;bD=dd;bS=s;}else if(dd<sD)sD=dd;}
    var bf=sD>0&&(bD/sD)>0.68?0.52:1.0,nz=((py*53+px_*97)&255)*0.031-4;
    var bi=(py*W+px_)*4,pi=bS*3,gi=parents[bS]*3;
    d[bi]=Math.min(255,Math.max(0,((phRGB[pi]+(gRGB[gi]-phRGB[pi])*pC+nz)*bf)|0));
    d[bi+1]=Math.min(255,Math.max(0,((phRGB[pi+1]+(gRGB[gi+1]-phRGB[pi+1])*pC+nz)*bf)|0));
    d[bi+2]=Math.min(255,Math.max(0,((phRGB[pi+2]+(gRGB[gi+2]-phRGB[pi+2])*pC+nz)*bf)|0));
    d[bi+3]=255;
  }}
  cx.putImageData(img,0,0);
}
// ─────────────────────────────────────────────────────────────────────────────

// ── SCHIST → GNEISS  mineral sorting + color transformation ──────────────────
function setupSchGn2(){
  var rand=rng(8234);
  var N=38,nBands=9,bandH=H/nBands;
  var seeds=[],sXY=new Float32Array(N*2),sRGB=new Uint8Array(N*3),sEndRGB=new Uint8Array(N*3);
  for(var i=0;i<N;i++){
    var x=15+rand()*(W-30),y=15+rand()*(H-30),isMafic=false;
    var pick=rand(),jt=(rand()-0.5)*14,sr,sg,sb,er,eg,eb;
    if(pick<0.55){                                  // hornblende / biotite: dark green-black
      var v=24+rand()*18;sr=(v+8)|0;sg=(v+14)|0;sb=(v+4)|0;
      var ev=10+rand()*14;er=ev|0;eg=Math.max(0,ev-2)|0;eb=Math.max(0,ev-3)|0;
      isMafic=true;
    }else if(pick<0.80){                            // phengite / mica: silver gray-green → pink-rose
      var v=118+rand()*28;sr=(v+jt)|0;sg=(v+8+jt)|0;sb=(v-5+jt)|0;
      var ev=188+rand()*20;er=(ev+14)|0;eg=(ev-18)|0;eb=(ev-24)|0;
    }else{                                          // quartz / feldspar: light gray → off-white
      var v=182+rand()*22;sr=(v+5+jt)|0;sg=(v+3+jt)|0;sb=(v-1+jt)|0;
      var ev=215+rand()*18;er=(ev+5)|0;eg=(ev+2)|0;eb=(ev-1)|0;
    }
    var tgt=isMafic?[1,3,5,7]:[0,2,4,6,8];
    var tb=tgt[Math.floor(rand()*tgt.length)];
    var ty=Math.max(10,Math.min(H-10,(tb+0.5)*bandH+(rand()-0.5)*bandH*0.5));
    seeds.push({ox:x,oy:y,ty:ty});
    sXY[i*2]=x;sXY[i*2+1]=y;
    sRGB[i*3]=Math.min(255,Math.max(0,sr));sRGB[i*3+1]=Math.min(255,Math.max(0,sg));sRGB[i*3+2]=Math.min(255,Math.max(0,sb));
    sEndRGB[i*3]=Math.min(255,Math.max(0,er));sEndRGB[i*3+1]=Math.min(255,Math.max(0,eg));sEndRGB[i*3+2]=Math.min(255,Math.max(0,eb));
  }
  SCHGN2={seeds:seeds,sXY:sXY,sRGB:sRGB,sEndRGB:sEndRGB,N:N};
}
function renderSchGn2(p){
  var st=SCHGN2,N=st.N,sXY=st.sXY,sRGB=st.sRGB,sEndRGB=st.sEndRGB,seeds=st.seeds;
  var pM=Math.max(0,(p-0.12)/0.88);pM=pM<0.5?2*pM*pM:-1+(4-2*pM)*pM;
  var pC=p<0.5?2*p*p:-1+(4-2*p)*p;
  var sX=1.4+p*2.0,sY=Math.max(0.25,0.62-p*0.37);
  var ix2=1/(sX*sX),iy2=1/(sY*sY);
  var wA=6+p*16,warpCol=new Float32Array(W);
  for(var x=0;x<W;x++)warpCol[x]=wA*(Math.sin(x*0.020)*0.58+Math.sin(x*0.0082+1.2)*0.42);
  for(var i=0;i<N;i++)sXY[i*2+1]=seeds[i].oy+(seeds[i].ty-seeds[i].oy)*pM;
  var img=cx.createImageData(W,H),d=img.data;
  for(var py=0;py<H;py++){
    for(var px_=0;px_<W;px_++){
      var wy=py+warpCol[px_],bD=1e9,bS=0,sD=1e9;
      for(var s=0,si=0;s<N;s++,si+=2){var dx=px_-sXY[si],dy=wy-sXY[si+1],dd=dx*dx*ix2+dy*dy*iy2;if(dd<bD){sD=bD;bD=dd;bS=s;}else if(dd<sD)sD=dd;}
      var bf=sD>0&&(bD/sD)>0.68?0.52:1.0;
      var nz=((py*53+px_*97)&255)*0.031-4;
      var bi=(py*W+px_)*4,ci=bS*3;
      d[bi  ]=Math.min(255,Math.max(0,((sRGB[ci  ]+(sEndRGB[ci  ]-sRGB[ci  ])*pC+nz)*bf)|0));
      d[bi+1]=Math.min(255,Math.max(0,((sRGB[ci+1]+(sEndRGB[ci+1]-sRGB[ci+1])*pC+nz)*bf)|0));
      d[bi+2]=Math.min(255,Math.max(0,((sRGB[ci+2]+(sEndRGB[ci+2]-sRGB[ci+2])*pC+nz)*bf)|0));
      d[bi+3]=255;
    }
  }
  cx.putImageData(img,0,0);
}
// ─────────────────────────────────────────────────────────────────────────────

function run(key){
  var tk=++token;curKey=key;finalT=null;finalP=null;
  var sc=SC[key];
  var r=document.getElementById('res');r.classList.remove('on');
  document.getElementById('rp').style.display='none';
  document.getElementById('up').style.display='none';
  document.getElementById('desc').textContent=sc.desc;
  var showIM=sc.pelitic&&sc.gS!==null;
  document.getElementById('imbar').style.display=showIM?'block':'none';
  cx.fillStyle='#0e0b0a';cx.fillRect(0,0,W,H);
  if(key==='grGn'&&!GG)setupGG();
  else if(key==='lmMbl'&&!LMMBL)setupLmMbl();
  else if(key==='sndQtz'&&!SNDQTZ)setupSndQtz();
  else if(key==='schGn'&&!SCHGN2)setupSchGn2();
  else if((key==='shlSl'||key==='slPh')&&!BARROV)setupBARROV();
  else if(key==='phSch'){if(!SCHGN2)setupSchGn2();if(!BARROV||!BARROV.phParents)setupPhSch();}
  setTimeout(function(){
    if(token!==tk)return;
    var isPhys=key==='grGn'||key==='lmMbl'||key==='sndQtz'||key==='schGn'||key==='shlSl'||key==='slPh'||key==='phSch';
    var sPx=isPhys?null:getTex(sc.from);
    var ePx=isPhys?null:getTex(sc.to);
    if(token!==tk)return;
    var seed=0;for(var i=0;i<key.length;i++)seed+=key.charCodeAt(i)*(i+1)*17;
    var rand=rng(seed);
    var garnets=[];
    if(sc.garnets){for(var i=0;i<10;i++){var sides=6+Math.floor(rand()*4);var verts=[];for(var j=0;j<sides;j++)verts.push(0.72+rand()*0.5);garnets.push({x:rand()*W,y:rand()*H,maxR:8+rand()*10,at:0.18+rand()*0.44,sides:sides,verts:verts});}}
    var micas=[];
    if(sc.mica){for(var i=0;i<110;i++)micas.push({x:rand()*W,pi:Math.floor(rand()*Math.ceil(H/3)),len:3+rand()*11,b:Math.round(175+rand()*65),lw:0.6+rand()*0.9});}
    var buf=isPhys?null:new Uint8ClampedArray(W*H*4);
    var img2=isPhys?null:cx.createImageData(W,H);
    var path=PTPATHS[key];
    var t0=performance.now();
    function frm(now){
      if(token!==tk)return;
      var raw=Math.min((now-t0)/sc.dur,1);
      var p=raw<.5?2*raw*raw:-1+(4-2*raw)*raw;
      var T=path[0].t+(path[1].t-path[0].t)*raw;
      var P=path[0].p+(path[1].p-path[0].p)*raw;
      setGauges(T,P);
      if(key==='grGn'){
        renderGG(p);
        drawStress(cx,raw,true);
      }else if(key==='shlSl'){
        if(showIM)updateIM(sc.gS+(sc.gE-sc.gS)*raw);
        renderShlSl(p);
        drawStress(cx,raw,true);
      }else if(key==='slPh'){
        if(showIM)updateIM(sc.gS+(sc.gE-sc.gS)*raw);
        renderSlPh(p);
        drawStress(cx,raw,true);
      }else if(key==='phSch'){
        if(showIM)updateIM(sc.gS+(sc.gE-sc.gS)*raw);
        renderPhSch(p);
        drawStress(cx,raw,true);
      }else if(key==='schGn'){
        if(showIM)updateIM(sc.gS+(sc.gE-sc.gS)*raw);
        renderSchGn2(p);
        drawStress(cx,raw,true);
      }else if(key==='lmMbl'){
        renderLmMbl(p);
      }else if(key==='sndQtz'){
        renderSndQtz(p);
      }else{
        if(showIM)updateIM(sc.gS+(sc.gE-sc.gS)*raw);
        for(var i=0;i<W*H*4;i++)buf[i]=sPx[i]+(ePx[i]-sPx[i])*p;
        img2.data.set(buf);cx.putImageData(img2,0,0);
        var fo=null,fs=sc.fs,fe=sc.fe;
        if(fs&&fe){fo={sp:lerp(fs.sp,fe.sp,p),amp:lerp(fs.amp,fe.amp,p),freq:lerp(fs.freq,fe.freq,p),al:lerp(fs.al,fe.al,p),col:fe.col,lw:lerp(fs.lw,fe.lw,p)};}
        else if(fe){fo={sp:fe.sp,amp:fe.amp,freq:fe.freq,al:fe.al*p,col:fe.col,lw:fe.lw};}
        else if(fs){fo={sp:fs.sp,amp:fs.amp,freq:fs.freq,al:fs.al*(1-p),col:fs.col,lw:fs.lw};}
        drawFoliation(cx,fo);
        if(sc.mica&&fo)drawMica(cx,micas,p,fo);
        drawGarnets(cx,garnets,p);
        drawStress(cx,raw,sc.stress);
      }
      drawPT(T,P,key);
      if(raw<1){requestAnimationFrame(frm);}
      else{finalT=path[1].t;finalP=path[1].p;drawPT(finalT,finalP,key);showResult(sc);}
    }
    requestAnimationFrame(frm);
  },12);
}

function runUplift(){
  if(finalT===null)return;
  var tk=++token;
  document.getElementById('up').style.display='none';
  document.getElementById('rp').style.display='none';
  var sT=finalT,sP=finalP,dur=3200,t0=performance.now();
  function frm(now){
    if(token!==tk)return;
    var raw=Math.min((now-t0)/dur,1);
    var p=raw<.5?2*raw*raw:-1+(4-2*raw)*raw;
    var T=lerp(sT,120,p),P=lerp(sP,0.2,p);
    setGauges(T,P);drawPT(T,P,curKey);
    if(raw<1){requestAnimationFrame(frm);}
    else{
      setGauges(120,0.2);drawPT(120,0.2,null);
      document.getElementById('nti').textContent='Erosion has brought this rock to the surface — the metamorphic texture is preserved during uplift and decompression. This is why schist and gneiss are exposed in the Adirondacks.';
      document.getElementById('rp').style.display='inline-block';
    }
  }
  requestAnimationFrame(frm);
}

cx.fillStyle='#0d0c0a';cx.fillRect(0,0,W,H);
cx.fillStyle='rgba(140,130,100,.4)';cx.font='12px system-ui,sans-serif';
cx.textAlign='center';cx.textBaseline='middle';
cx.fillText('Select a transformation above',W/2,H/2);
drawPT(null,null,null);

var btns=document.querySelectorAll('.sbtn[data-k]');
for(var i=0;i<btns.length;i++){
  btns[i].addEventListener('click',function(){
    for(var j=0;j<btns.length;j++)btns[j].classList.remove('on');
    this.classList.add('on');run(this.dataset.k);
  });
}
document.getElementById('rp').addEventListener('click',function(){if(curKey)run(curKey);});
document.getElementById('up').addEventListener('click',runUplift);
</script>
